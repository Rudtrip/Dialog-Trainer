<noscript><div><img src="https://mc.yandex.ru/watch/107721459" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    <div id="app" class="h-screen"></div>

    <script>
      const MESSAGE_EMOTION_STATES = [
        { key: "neutral", label: "Нейтрально", icon: "sentiment_neutral" },
        { key: "happy", label: "Радость", icon: "sentiment_satisfied" },
        { key: "concerned", label: "Тревога", icon: "sentiment_dissatisfied" },
        { key: "angry", label: "Злость", icon: "sentiment_very_dissatisfied" },
      ];

      const state = {
        token: "",
        publicationKey: "",
        sourceMode: "preview",
        data: null,
        selections: {},
        awaitFirstChoice: true,
        loading: true,
        error: "",
      };

      const appEl = document.getElementById("app");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeSceneType(value) {
        return String(value || "").trim().toLowerCase() === "dialog" ? "dialog" : "messenger";
      }

      function normalizeEmotionState(value) {
        const normalized = String(value || "").trim().toLowerCase();
        return MESSAGE_EMOTION_STATES.some((item) => item.key === normalized) ? normalized : "neutral";
      }

      function parseOptionalInteger(value, min, max) {
        if (value === null || value === undefined || value === "") return null;
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return null;
        const normalized = Math.trunc(parsed);
        if (normalized < min || normalized > max) return null;
        return normalized;
      }

      function getRuntimeSourceFromPath() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        const [first, second] = parts;

        if (first === "preview" && second) {
          return { mode: "preview", value: String(second || "").trim() };
        }

        if (first === "p" && second) {
          return { mode: "publication", value: String(second || "").trim() };
        }

        return { mode: "preview", value: String(parts[parts.length - 1] || "").trim() };
      }

      function sortNodesByX(nodes) {
        return (Array.isArray(nodes) ? nodes.slice() : []).sort((a, b) => {
          const ax = Number(a?.position?.x || 0);
          const bx = Number(b?.position?.x || 0);
          return ax - bx;
        });
      }

      function getNodeById(nodeId) {
        return (state.data?.graph?.nodes || []).find((node) => node.id === nodeId) || null;
      }

      function getOutgoingNodes(sourceId, targetType) {
        if (!sourceId) return [];
        const edges = Array.isArray(state.data?.graph?.edges) ? state.data.graph.edges : [];
        const outgoing = edges
          .filter((edge) => edge.source === sourceId)
          .map((edge) => getNodeById(edge.target))
          .filter((node) => Boolean(node));

        if (!targetType) return outgoing;
        return outgoing.filter((node) => node.type === targetType);
      }

      function clampNumber(value, min, max) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return min;
        return Math.min(Math.max(parsed, min), max);
      }

      function normalizeEndingType(value) {
        const normalized = String(value || "").trim().toLowerCase();
        if (normalized === "success" || normalized === "fail" || normalized === "neutral") {
          return normalized;
        }
        return "neutral";
      }

      function getFinishTypeMeta(endingType) {
        const normalized = normalizeEndingType(endingType);
        if (normalized === "success") {
          return {
            key: "success",
            label: "Успех",
            icon: "check_circle",
            badgeClass: "border-emerald-200 bg-emerald-50 text-emerald-700",
          };
        }
        if (normalized === "fail") {
          return {
            key: "fail",
            label: "Провал",
            icon: "cancel",
            badgeClass: "border-rose-200 bg-rose-50 text-rose-700",
          };
        }
        return {
          key: "neutral",
          label: "Нейтрально",
          icon: "flag",
          badgeClass: "border-sky-200 bg-sky-50 text-sky-700",
        };
      }

      function getScenarioMaxScore(initialMessageId) {
        if (!initialMessageId) return 0;

        function walkMessage(messageId, visitedMessageIds, depth) {
          if (!messageId || depth > 64 || visitedMessageIds.has(messageId)) {
            return null;
          }

          const nextVisited = new Set(visitedMessageIds);
          nextVisited.add(messageId);

          const responseNodes = sortNodesByX(getOutgoingNodes(messageId, "response"));
          if (responseNodes.length === 0) {
            return 0;
          }

          let bestScore = null;
          responseNodes.forEach((responseNode) => {
            const scoreDelta = Number(responseNode.data?.scoreDelta);
            const ownScore = Number.isFinite(scoreDelta) ? scoreDelta : 0;
            const nextMessage = sortNodesByX(getOutgoingNodes(responseNode.id, "message"))[0] || null;

            if (nextMessage) {
              const continuationScore = walkMessage(nextMessage.id, nextVisited, depth + 1);
              if (continuationScore === null) {
                return;
              }
              const candidateScore = ownScore + continuationScore;
              if (bestScore === null || candidateScore > bestScore) {
                bestScore = candidateScore;
              }
              return;
            }

            if (bestScore === null || ownScore > bestScore) {
              bestScore = ownScore;
            }
          });

          return bestScore === null ? 0 : bestScore;
        }

        const resolved = walkMessage(initialMessageId, new Set(), 0);
        return Number.isFinite(resolved) ? resolved : 0;
      }

      function getFinishSummary(preview) {
        const customDescription = String(preview.finishDescription || "").trim();
        if (customDescription) {
          return customDescription;
        }

        if (preview.passed) {
          if (preview.passScore !== null) {
            return `Сценарий завершен успешно. Вы набрали достаточно баллов для прохождения и достигли порога ${preview.passScore}.`;
          }
          return "Сценарий завершен успешно. Итог определяется выбранной веткой и набранными баллами.";
        }

        if (preview.passScore !== null) {
          return `Сценарий завершен, но набранных баллов недостаточно для прохождения. Требуемый порог: ${preview.passScore}.`;
        }

        return "Сценарий завершен неуспешно. Попробуйте пройти его еще раз и выбрать другую стратегию ответа.";
      }

      function resolveAssetMediaUrl(value) {
        if (!value) return "";
        if (typeof value === "string") return value.trim();
        if (typeof value === "object") {
          return String(value.thumbnailUrl || value.fileUrl || value.url || value.src || "").trim();
        }
        return "";
      }

      function getAssetById(type, assetId) {
        const normalizedType = type === "background" ? "background" : "character";
        const list = state.data?.assetCatalog?.[normalizedType];
        if (!Array.isArray(list) || !assetId) return null;
        return list.find((asset) => String(asset.id || "") === String(assetId || "")) || null;
      }

      function resolveCharacterEmotionImageUrl(asset, emotionState) {
        if (!asset) return "";
        const metadata = asset.metadata && typeof asset.metadata === "object" ? asset.metadata : {};
        const stateKey = normalizeEmotionState(emotionState);

        const fromEmotionImages =
          metadata.emotionImages && typeof metadata.emotionImages === "object"
            ? resolveAssetMediaUrl(metadata.emotionImages[stateKey])
            : "";
        if (fromEmotionImages) return fromEmotionImages;

        const fromEmotionMap =
          metadata.emotions && !Array.isArray(metadata.emotions) && typeof metadata.emotions === "object"
            ? resolveAssetMediaUrl(metadata.emotions[stateKey])
            : "";
        if (fromEmotionMap) return fromEmotionMap;

        if (Array.isArray(metadata.emotions)) {
          const fromArray = metadata.emotions.find((item) => {
            const itemKey = String(item?.key || item?.state || item?.emotion || "")
              .trim()
              .toLowerCase();
            return itemKey === stateKey;
          });
          const fromArrayUrl = resolveAssetMediaUrl(fromArray);
          if (fromArrayUrl) return fromArrayUrl;
        }

        const fromFlatKeys =
          resolveAssetMediaUrl(metadata[`${stateKey}Url`]) ||
          resolveAssetMediaUrl(metadata[`${stateKey}_url`]) ||
          resolveAssetMediaUrl(metadata[`emotion_${stateKey}`]) ||
          resolveAssetMediaUrl(metadata[`emotion_${stateKey}_url`]);
        if (fromFlatKeys) return fromFlatKeys;

        return asset.thumbnailUrl || asset.fileUrl || "";
      }

      function buildRuntimeState() {
        const graph = state.data?.graph || { nodes: [], edges: [] };
        const nodes = Array.isArray(graph.nodes) ? graph.nodes : [];
        const startNode = nodes.find((node) => node.type === "start") || null;
        const passScore = parseOptionalInteger(startNode?.data?.passScore, 0, 100000);

        const baseState = {
          sceneType: normalizeSceneType(state.data?.sceneType),
          dialogName: String(state.data?.dialogName || "Предпросмотр").trim() || "Предпросмотр",
          empty: true,
          bubbles: [],
          choices: [],
          activeMessageId: null,
          activeSpeakerName: "Персонаж",
          activeMessageText: "",
          activeCharacterImageUrl: "",
          activeCharacterTitle: "Персонаж",
          activeBackgroundImageUrl: "",
          activeEmotionLabel: "Нейтрально",
          activeEmotionIcon: "sentiment_neutral",
          totalScore: 0,
          maxScore: 0,
          scorePercent: 0,
          passScore,
          finished: false,
          passed: true,
          finishType: "neutral",
          finishTypeLabel: "Нейтрально",
          finishLabel: "Финиш",
          finishDescription: "",
        };

        const firstMessageFromStart = sortNodesByX(getOutgoingNodes(startNode?.id, "message"))[0] || null;
        const fallbackMessage = nodes.find((node) => node.type === "message") || null;
        const initialMessage = firstMessageFromStart || fallbackMessage;
        const scenarioMaxScore = getScenarioMaxScore(initialMessage?.id);
        let currentMessage = initialMessage;

        if (!currentMessage) {
          return baseState;
        }

        const bubbles = [];
        let choices = [];
        let activeMessageId = null;
        let totalScore = 0;
        let finished = false;
        let finishNode = null;
        let activeMeta = null;
        let activeBackgroundImageUrl = "";
        const visited = new Set();
        let depth = 0;

        while (currentMessage && depth < 24) {
          const revisited = visited.has(currentMessage.id);
          visited.add(currentMessage.id);
          depth += 1;

          const speakerName = String(currentMessage.data?.speakerName || "Персонаж").trim() || "Персонаж";
          const messageText = String(currentMessage.data?.text || "").trim() || "Пустое сообщение";
          const emotionState = normalizeEmotionState(currentMessage.data?.emotionState);
          const emotionMeta =
            MESSAGE_EMOTION_STATES.find((emotion) => emotion.key === emotionState) || MESSAGE_EMOTION_STATES[0];

          const characterAsset = getAssetById("character", currentMessage.data?.characterAssetId);
          const characterImageUrl = resolveCharacterEmotionImageUrl(characterAsset, emotionState);
          const backgroundAsset = getAssetById("background", currentMessage.data?.backgroundAssetId);
          const backgroundUrl = resolveAssetMediaUrl(
            backgroundAsset?.fileUrl || backgroundAsset?.thumbnailUrl
          );
          if (backgroundUrl) {
            activeBackgroundImageUrl = backgroundUrl;
          }

          activeMeta = {
            speakerName,
            messageText,
            characterImageUrl,
            characterTitle: String(characterAsset?.title || speakerName || "Персонаж"),
            emotionLabel: emotionMeta?.label || "Нейтрально",
            emotionIcon: emotionMeta?.icon || "sentiment_neutral",
          };

          bubbles.push({ key: `m_${currentMessage.id}`, side: "left", text: messageText });

          const responseNodes = sortNodesByX(getOutgoingNodes(currentMessage.id, "response"));
          if (responseNodes.length === 0) {
            choices = [];
            activeMessageId = null;
            break;
          }

          activeMessageId = currentMessage.id;
          choices = responseNodes.map((responseNode) => ({
            id: responseNode.id,
            text: String(responseNode.data?.responseText || "").trim() || "Пустой ответ",
          }));

          if (state.awaitFirstChoice) {
            break;
          }
          if (revisited) {
            break;
          }

          const selectedResponseId = String(state.selections[currentMessage.id] || "").trim();
          if (!selectedResponseId) {
            break;
          }

          const selectedResponse = responseNodes.find((responseNode) => responseNode.id === selectedResponseId);
          if (!selectedResponse) {
            delete state.selections[currentMessage.id];
            break;
          }

          const scoreDelta = Number(selectedResponse.data?.scoreDelta);
          totalScore += Number.isFinite(scoreDelta) ? scoreDelta : 0;

          bubbles.push({
            key: `r_${selectedResponse.id}`,
            side: "right",
            text: String(selectedResponse.data?.responseText || "").trim() || "Пустой ответ",
          });

          const nextMessage = sortNodesByX(getOutgoingNodes(selectedResponse.id, "message"))[0] || null;
          if (nextMessage) {
            currentMessage = nextMessage;
            continue;
          }

          finishNode = sortNodesByX(getOutgoingNodes(selectedResponse.id, "end"))[0] || {
            id: "finish_auto",
            data: { endingType: "neutral", title: "Финиш" },
          };
          finished = true;
          choices = [];
          activeMessageId = null;
          break;
        }

        let passed = true;
        if (finished) {
          if (passScore !== null) {
            passed = totalScore >= passScore;
          } else {
            const endingType = String(finishNode?.data?.endingType || "").trim().toLowerCase();
            passed = endingType !== "fail";
          }
        }

        const finishType = normalizeEndingType(finishNode?.data?.endingType);
        const finishTypeMeta = getFinishTypeMeta(finishType);
        const maxScore = Math.max(0, Number.isFinite(scenarioMaxScore) ? scenarioMaxScore : 0, totalScore);
        const scorePercent =
          maxScore > 0
            ? Math.round(clampNumber((totalScore / maxScore) * 100, 0, 100))
            : totalScore > 0
              ? 100
              : 0;

        return {
          sceneType: normalizeSceneType(state.data?.sceneType),
          dialogName: String(state.data?.dialogName || "Предпросмотр").trim() || "Предпросмотр",
          empty: bubbles.length === 0,
          bubbles,
          choices,
          activeMessageId,
          activeSpeakerName: activeMeta?.speakerName || "Персонаж",
          activeMessageText: activeMeta?.messageText || "",
          activeCharacterImageUrl: activeMeta?.characterImageUrl || "",
          activeCharacterTitle: activeMeta?.characterTitle || "Персонаж",
          activeBackgroundImageUrl,
          activeEmotionLabel: activeMeta?.emotionLabel || "Нейтрально",
          activeEmotionIcon: activeMeta?.emotionIcon || "sentiment_neutral",
          totalScore,
          maxScore,
          scorePercent,
          passScore,
          finished,
          passed,
          finishType,
          finishTypeLabel: finishTypeMeta.label,
          finishDescription: String(finishNode?.data?.description || "").trim(),
          finishLabel: String(finishNode?.data?.title || "").trim() || "Финиш",
        };
      }

      function renderMessenger(preview) {
        const bubblesMarkup = preview.bubbles
          .map((bubble) => {
            const bubbleClass = bubble.side === "right" ? "phone-bubble-right" : "phone-bubble-left";
            return `<div class="${bubbleClass}">${escapeHtml(bubble.text)}</div>`;
          })
          .join("");

        const selectedId = String(state.selections[preview.activeMessageId] || "");
        const choicesMarkup = preview.choices
          .map(
            (choice) => `
              <button
                type="button"
                class="runtime-choice-btn ${selectedId === choice.id ? "active" : ""}"
                data-choice-id="${escapeHtml(choice.id)}"
                data-message-id="${escapeHtml(preview.activeMessageId || "")}"
              >
                ${escapeHtml(choice.text)}
              </button>
            `
          )
          .join("");

        const backgroundStyle = preview.activeBackgroundImageUrl
          ? `style="background-image:linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),url('${escapeHtml(
              preview.activeBackgroundImageUrl
            )}');background-size:cover;background-position:center;"`
          : "";

        return `
          <div class="h-screen overflow-hidden bg-slate-100 flex flex-col">
            <header class="border-b border-slate-200 bg-white flex flex-wrap items-center justify-between gap-2 px-3 sm:px-4 py-2">
              <div class="font-semibold text-sm sm:text-base text-slate-800">${escapeHtml(preview.dialogName)}</div>
              <div class="flex items-center gap-3">
                <div class="text-xs font-semibold text-slate-500">PTS: <span class="text-primary">${escapeHtml(
                  String(preview.totalScore)
                )}</span></div>
                <button id="resetBtn" class="h-8 rounded-full border border-slate-200 bg-white px-3 text-xs font-semibold text-slate-600 hover:text-primary">Сбросить</button>
              </div>
            </header>
            <main class="flex-1 flex items-center justify-center p-3 sm:p-6">
              <div class="phone-shell">
                <div class="phone-notch"></div>
                <div class="bg-white border-b border-gray-100 pt-8 pb-3 px-4 flex items-center gap-3">
                  <span class="material-symbols-outlined text-gray-400 text-lg">chevron_left</span>
                  <div class="size-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center overflow-hidden">
                    ${
                      preview.activeCharacterImageUrl
                        ? `<img src="${escapeHtml(preview.activeCharacterImageUrl)}" alt="${escapeHtml(preview.activeCharacterTitle)}" class="size-8 object-cover" />`
                        : `<span class="material-symbols-outlined text-sm">person</span>`
                    }
                  </div>
                  <div class="flex flex-col min-w-0">
                    <span class="text-xs font-bold truncate">${escapeHtml(preview.activeSpeakerName || "Персонаж")}</span>
                    <span class="text-[10px] text-green-500 font-medium">В сети</span>
                  </div>
                  <div class="ml-auto flex gap-1">
                    <span class="material-symbols-outlined text-primary text-base">call</span>
                    <span class="material-symbols-outlined text-primary text-base">videocam</span>
                  </div>
                </div>
                <div class="flex-1 min-h-0 p-4 flex flex-col gap-2 overflow-y-auto bg-white" ${backgroundStyle}>
                  ${bubblesMarkup || '<div class="text-xs text-slate-400">Нет сообщений.</div>'}
                </div>
                <div class="p-3 border-t border-gray-100 bg-white pb-6 flex flex-col gap-3">
                  <div class="flex flex-col gap-2">${choicesMarkup}</div>
                  <div class="w-full h-8 bg-gray-100 rounded-full px-3 flex items-center">
                    <span class="text-[10px] text-gray-400">Aa</span>
                  </div>
                </div>
                <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-20 h-1 bg-gray-300 rounded-full"></div>
              </div>
            </main>
          </div>
        `;
      }

      function renderDialog(preview) {
        const choicesMarkup = preview.choices
          .map((choice) => {
            const selectedId = String(state.selections[preview.activeMessageId] || "");
            return `
                <button
                  type="button"
                  class="runtime-choice-btn ${selectedId === choice.id ? "active" : ""}"
                  data-choice-id="${escapeHtml(choice.id)}"
                  data-message-id="${escapeHtml(preview.activeMessageId || "")}"
                >
                  ${escapeHtml(choice.text)}
                </button>
              `;
          })
          .join("");

        const stageBackground = preview.activeBackgroundImageUrl
          ? `style="background-image:url('${escapeHtml(
              preview.activeBackgroundImageUrl
            )}');background-size:cover;background-position:center;"`
          : "";

        return `
          <div class="runtime-dialog-root h-screen overflow-hidden bg-slate-100 p-2 sm:p-4 md:p-6">
            <div class="runtime-dialog-stage dialog-stage relative h-[calc(100vh-1rem)] sm:h-[calc(100vh-2rem)] rounded-2xl overflow-hidden border border-slate-200 bg-slate-50" ${stageBackground}>
              <div class="absolute inset-0 bg-white/35"></div>
              <div class="relative z-10 flex h-full flex-col">
                <header class="runtime-dialog-header border-b border-slate-200 bg-white/90 backdrop-blur-sm flex flex-wrap items-center justify-between gap-2 px-3 sm:px-4 py-2">
                  <div class="runtime-dialog-title font-semibold text-sm sm:text-base text-slate-800">${escapeHtml(preview.dialogName)}</div>
                  <div class="runtime-dialog-score-row flex items-center gap-3">
                    <div class="text-xs font-semibold text-slate-500">PTS: <span class="text-primary">${escapeHtml(
                      String(preview.totalScore)
                    )}</span></div>
                    <button id="resetBtn" class="h-8 rounded-full border border-slate-200 bg-white px-3 text-xs font-semibold text-slate-600 hover:text-primary">Сбросить</button>
                  </div>
                </header>
                <main class="runtime-dialog-main flex-1 min-h-0 overflow-hidden flex flex-col md:flex-row items-stretch md:items-end justify-between gap-3 md:gap-6 px-2 sm:px-4 md:px-8 pb-2 md:pb-0 pt-3">
                  <div class="runtime-dialog-character-col w-full md:w-[40%] h-auto md:h-full self-end flex flex-col items-center justify-end order-2 md:order-1">
                    <div class="runtime-dialog-character-box relative w-full max-w-[300px] sm:max-w-[340px] md:max-w-[420px] h-[34vh] sm:h-[42vh] md:h-[72vh] max-h-[300px] sm:max-h-[420px] md:max-h-[calc(100vh-180px)] flex flex-col items-center justify-end">
                      ${
                        preview.activeCharacterImageUrl
                          ? `<img src="${escapeHtml(preview.activeCharacterImageUrl)}" alt="${escapeHtml(
                              preview.activeCharacterTitle
                            )}" class="h-auto max-h-[88%] w-auto max-w-full object-contain object-bottom drop-shadow-2xl" />`
                          : `<div class="h-[70%] w-full rounded-2xl border border-dashed border-slate-300 bg-white/70 text-slate-500 flex items-center justify-center text-sm font-medium">Персонаж не выбран</div>`
                      }
                      ${
                        preview.activeCharacterImageUrl
                          ? `<div class="mt-2 md:mt-3 bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-xl flex items-center gap-2 shadow border border-white">
                              <span class="material-symbols-outlined text-primary text-[18px]">${escapeHtml(
                                preview.activeEmotionIcon
                              )}</span>
                              <span class="text-[10px] font-bold text-slate-700 uppercase tracking-widest">${escapeHtml(
                                preview.activeEmotionLabel
                              )}</span>
                            </div>`
                          : ""
                      }
                    </div>
                  </div>
                  <div class="runtime-dialog-content-col w-full md:w-[60%] flex flex-col gap-3 md:gap-4 mb-0 md:mb-4 max-w-none md:max-w-3xl order-1 md:order-2">
                    <div class="runtime-dialog-message-card bg-white rounded-2xl p-4 sm:p-5 md:p-7 border border-slate-100 shadow-lg shadow-slate-200/40 relative min-h-[110px] sm:min-h-[140px]">
                      <div class="absolute -top-3.5 left-4 sm:left-6 bg-primary text-white px-3 sm:px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow">
                        ${escapeHtml(preview.activeSpeakerName || "Персонаж")}
                      </div>
                      <span class="material-symbols-outlined text-slate-100 text-5xl sm:text-6xl absolute right-4 sm:right-6 top-3 sm:top-5 select-none">format_quote</span>
                      <p class="runtime-dialog-message-text relative z-10 text-slate-800 text-lg sm:text-xl md:text-2xl font-medium leading-relaxed">${escapeHtml(
                        preview.activeMessageText || "Добавьте ноду «Сообщение», чтобы увидеть предпросмотр."
                      )}</p>
                    </div>
                    <div class="runtime-dialog-choices flex flex-col gap-2.5">${choicesMarkup}</div>
                  </div>
                </main>
              </div>
            </div>
          </div>
        `;
      }

      function renderRuntimeResult(preview) {
        const completionMeta = preview.passed
          ? {
              label: "Сценарий пройден",
              icon: "check_circle",
              badgeClass: "border-emerald-200 bg-emerald-50 text-emerald-700",
              gradientClass: "from-emerald-400 to-primary",
            }
          : {
              label: "Сценарий не пройден",
              icon: "cancel",
              badgeClass: "border-rose-200 bg-rose-50 text-rose-700",
              gradientClass: "from-rose-400 to-orange-400",
            };
        const finishTypeMeta = getFinishTypeMeta(preview.finishType);
        const maxScore = Math.max(0, Number(preview.maxScore) || 0, Number(preview.totalScore) || 0);
        const scorePercent = Math.round(clampNumber(preview.scorePercent, 0, 100));
        const progressOffset = 264 - (264 * scorePercent) / 100;
        const summaryText = getFinishSummary(preview);

        return `
          <div class="h-screen overflow-auto bg-slate-50 font-display text-slate-800 antialiased">
            <main class="min-h-full flex items-center justify-center p-4 sm:p-8">
              <div class="w-full max-w-2xl mx-auto">
                <div class="relative overflow-hidden rounded-[28px] border border-slate-100 bg-white p-6 text-center shadow-[0_20px_60px_rgba(15,23,42,0.08)] sm:p-8 md:p-10">
                  <div class="absolute left-0 top-0 h-2 w-full bg-gradient-to-r ${completionMeta.gradientClass}"></div>
                  <div class="mb-6 inline-flex items-center justify-center gap-2 rounded-full border px-4 py-1.5 text-sm font-semibold tracking-wide ${completionMeta.badgeClass}">
                    <span class="material-symbols-outlined text-[18px]">${completionMeta.icon}</span>
                    ${completionMeta.label}
                  </div>
                  <div class="relative mx-auto mb-6 size-40 cursor-default sm:size-52">
                    <svg class="size-full -rotate-90 transform" viewBox="0 0 100 100">
                      <circle class="text-slate-100" cx="50" cy="50" fill="transparent" r="42" stroke="currentColor" stroke-width="6"></circle>
                      <circle
                        class="text-primary progress-circle"
                        cx="50"
                        cy="50"
                        fill="transparent"
                        r="42"
                        stroke="currentColor"
                        stroke-dasharray="264"
                        stroke-dashoffset="${escapeHtml(String(progressOffset))}"
                        stroke-linecap="round"
                        stroke-width="6"
                      ></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                      <span class="text-5xl font-bold tracking-tight text-slate-900 sm:text-6xl">
                        ${escapeHtml(String(scorePercent))}<span class="text-xl font-normal text-slate-400 sm:text-2xl">%</span>
                      </span>
                      <span class="mt-1 text-xs font-medium uppercase tracking-wider text-slate-400 sm:text-sm">Результат</span>
                    </div>
                  </div>
                  <h1 class="mb-3 text-2xl font-bold text-slate-900 sm:text-3xl">${escapeHtml(
                    preview.finishLabel || "Результат сценария"
                  )}</h1>
                  <div class="mb-4 inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-semibold ${finishTypeMeta.badgeClass}">
                    <span class="material-symbols-outlined text-[18px]">${finishTypeMeta.icon}</span>
                    <span>Тип завершения: ${escapeHtml(preview.finishTypeLabel || finishTypeMeta.label)}</span>
                  </div>
                  <p class="mx-auto mb-6 max-w-xl text-sm leading-relaxed text-slate-500 sm:text-base">
                    ${escapeHtml(summaryText)}
                  </p>
                  <div class="mx-auto mb-6 grid w-full max-w-xl grid-cols-1 gap-4">
                    <div class="flex flex-col items-center rounded-2xl border border-slate-100 bg-slate-50 p-4">
                      <span class="mb-1 text-[11px] font-bold uppercase tracking-wider text-slate-400">Баллы</span>
                      <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-bold text-slate-900">${escapeHtml(String(preview.totalScore))}</span>
                        <span class="text-sm font-medium text-slate-400">/ ${escapeHtml(String(maxScore))}</span>
                      </div>
                    </div>
                  </div>
                  <div class="flex w-full justify-center">
                    <button
                      id="resetBtn"
                      class="h-12 w-full rounded-xl border-2 border-primary px-6 font-semibold text-primary transition-all duration-200 hover:bg-primary hover:text-white sm:w-auto sm:min-w-[220px]"
                    >
                      Пройти снова
                    </button>
                  </div>
                </div>
              </div>
            </main>
          </div>
        `;
      }

      function renderFinishCard(preview) {
        return `
          <div class="rounded-xl border px-4 py-3 text-sm ${
            preview.passed
              ? "border-green-200 bg-green-50 text-green-700"
              : "border-rose-200 bg-rose-50 text-rose-700"
          }">
            <div class="font-semibold">${preview.passed ? "Тест пройден" : "Тест провален"}</div>
            <div class="mt-1">PTS: <b>${escapeHtml(String(preview.totalScore))}</b>${
              preview.passScore === null
                ? ""
                : `, проходной: <b>${escapeHtml(String(preview.passScore))}</b>`
            }</div>
            <div class="mt-1 text-xs opacity-80">Финиш: ${escapeHtml(preview.finishLabel || "Финиш")}</div>
          </div>
        `;
      }

      function renderError(message) {
        appEl.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-6">
            <div class="max-w-xl w-full rounded-xl border border-rose-200 bg-rose-50 p-5 text-rose-700">
              <div class="font-semibold mb-1">Не удалось открыть предпросмотр</div>
              <div class="text-sm">${escapeHtml(message || "Неизвестная ошибка.")}</div>
            </div>
          </div>
        `;
      }

      function renderLoading() {
        appEl.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-6">
            <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600 shadow-sm">
              Загружаем предпросмотр...
            </div>
          </div>
        `;
      }

      function render() {
        if (state.loading) {
          renderLoading();
          return;
        }
        if (state.error) {
          renderError(state.error);
          return;
        }
        if (!state.data) {
          renderError("Пустые данные предпросмотра.");
          return;
        }

        const preview = buildRuntimeState();
        if (preview.finished) {
          appEl.innerHTML = renderRuntimeResult(preview);
          return;
        }
        appEl.innerHTML =
          preview.sceneType === "dialog" ? renderDialog(preview) : renderMessenger(preview);
      }

      async function loadPreview() {
        state.loading = true;
        state.error = "";
        render();

        try {
          const endpoint =
            state.sourceMode === "publication"
              ? `/api/v1/publications/${encodeURIComponent(state.publicationKey)}/runtime`
              : `/api/v1/preview/${encodeURIComponent(state.token)}`;

          const response = await fetch(endpoint, {
            method: "GET",
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload?.error || `Ошибка запроса: ${response.status}`);
          }

          state.data = payload;
          document.title = `${payload?.dialogName || "Диалог"} - Предпросмотр`;
          state.loading = false;
          state.error = "";
          render();
        } catch (error) {
          state.loading = false;
          state.error = error?.message || "Не удалось загрузить предпросмотр.";
          render();
        }
      }

      function resetConversation() {
        state.selections = {};
        state.awaitFirstChoice = true;
        render();
      }

      appEl.addEventListener("click", (event) => {
        const resetBtn = event.target.closest("#resetBtn");
        if (resetBtn) {
          resetConversation();
          return;
        }

        const choiceBtn = event.target.closest("[data-choice-id]");
        if (!choiceBtn) return;

        const messageId = String(choiceBtn.dataset.messageId || "").trim();
        const choiceId = String(choiceBtn.dataset.choiceId || "").trim();
        if (!messageId || !choiceId) return;

        state.awaitFirstChoice = false;
        state.selections[messageId] = choiceId;
        render();
      });

      function applyEmbedModeClass() {
        if (window.self !== window.top) {
          document.body.classList.add("embed-mode");
        } else {
          document.body.classList.remove("embed-mode");
        }
      }

      function init() {
        applyEmbedModeClass();
        const source = getRuntimeSourceFromPath();
        state.sourceMode = source.mode;

        if (source.mode === "publication") {
          state.publicationKey = source.value;
        } else {
          state.token = source.value;
        }

        if (!source.value) {
          state.loading = false;
          state.error =
            source.mode === "publication"
              ? "Не найден ключ публикации в URL."
              : "Не найден токен предпросмотра в URL.";
          render();
          return;
        }
        loadPreview();
      }

      init();
    </script>
  </body>
</html>
