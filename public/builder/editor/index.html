
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenario Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#514DF7",
              "primary-hover": "#403bc9",
              "background-light": "#f3f4f6",
              "surface-light": "#ffffff",
              "border-light": "#e5e7eb",
              "text-primary": "#1f2937",
              "text-secondary": "#6b7280",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      .node {
        position: absolute;
        cursor: grab;
        user-select: none;
      }

      .node.dragging {
        cursor: grabbing;
      }

      .node-selected {
        box-shadow: 0 0 0 3px rgba(81, 77, 247, 0.22);
      }

      .tool-active {
        background-color: rgba(81, 77, 247, 0.08);
        color: #514df7;
      }

      .add-option-btn[disabled] {
        opacity: 0.45;
        pointer-events: none;
      }

      .response-add-option-btn[disabled] {
        opacity: 0.45;
        pointer-events: none;
      }

      .phone-preview-shell {
        width: 330px;
        height: 700px;
        border-radius: 3rem;
        background: #fff;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        border: 8px solid #111827;
        box-shadow:
          0 0 0 12px #1a1a1a,
          0 0 0 14px #333,
          0 20px 50px rgba(0, 0, 0, 0.2);
      }

      .phone-preview-notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 96px;
        height: 20px;
        background: #000;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        z-index: 2;
      }

      .phone-bubble-left,
      .phone-bubble-right {
        max-width: 80%;
        border-radius: 16px;
        padding: 8px 12px;
        font-size: 13px;
        line-height: 1.3;
      }

      .phone-bubble-left {
        align-self: flex-start;
        background: #f3f4f6;
        color: #1f2937;
        border-bottom-left-radius: 4px;
      }

      .phone-bubble-right {
        align-self: flex-end;
        background: #514df7;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .phone-choice-btn {
        width: 100%;
        border-radius: 9999px;
        border: 1px solid #e5e7eb;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        text-align: left;
        color: #4b5563;
        background: #fff;
        transition: all 0.15s ease;
      }

      .phone-choice-btn:hover {
        border-color: #514df7;
        color: #514df7;
        background: rgba(81, 77, 247, 0.04);
      }

      .phone-choice-btn.active {
        border-color: #514df7;
        color: #514df7;
        background: rgba(81, 77, 247, 0.08);
      }

      @keyframes phoneBubbleIn {
        0% {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .phone-bubble-enter {
        animation: phoneBubbleIn 0.24s ease-out both;
      }
    </style>
  </head>
  <body class="bg-background-light font-display text-text-primary overflow-hidden h-screen flex flex-col">
    <header
      class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-light bg-surface-light px-6 py-3 shrink-0 z-20 shadow-sm"
    >
      <div class="flex items-center gap-4">
        <button
          id="backToBuilderBtn"
          class="size-8 flex items-center justify-center rounded-lg bg-gray-100 text-text-secondary hover:bg-gray-200"
          title="Назад к списку"
        >
          <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        </button>
        <div class="size-8 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
          <span class="material-symbols-outlined">account_tree</span>
        </div>
        <div class="flex flex-col">
          <h2 class="text-text-primary text-lg font-bold leading-tight tracking-[-0.015em]">Scenario Editor</h2>
          <div class="flex items-center gap-2 text-xs text-text-secondary">
            <span>Dialog Trainer</span>
            <span class="material-symbols-outlined text-[10px]">chevron_right</span>
            <span id="dialogNameLabel">Loading...</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3">
        <button
          id="previewBtn"
          class="flex items-center justify-center gap-2 rounded-lg h-9 px-4 bg-gray-100 text-text-primary hover:bg-gray-200 transition-colors text-sm font-semibold border border-gray-200"
        >
          <span class="material-symbols-outlined text-[18px]">visibility</span>
          <span>Preview</span>
        </button>
        <button
          id="publishBtn"
          class="flex items-center justify-center gap-2 rounded-lg h-9 px-4 bg-primary text-white hover:bg-primary-hover transition-colors text-sm font-semibold shadow-md shadow-indigo-200"
        >
          <span class="material-symbols-outlined text-[18px]">publish</span>
          <span>Publish</span>
        </button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
      <aside
        class="w-16 border-r border-border-light bg-surface-light flex flex-col items-center py-4 gap-4 z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]"
      >
        <button
          id="toolSelectBtn"
          class="size-10 rounded-lg flex items-center justify-center text-text-secondary hover:bg-primary/5 hover:text-primary transition-colors tool-active"
          title="Select"
        >
          <span class="material-symbols-outlined">near_me</span>
        </button>
        <button
          id="toolAddBtn"
          class="size-10 rounded-lg flex items-center justify-center text-text-secondary hover:bg-primary/5 hover:text-primary transition-colors"
          title="Add Node"
        >
          <span class="material-symbols-outlined">add_box</span>
        </button>
        <button
          id="toolConnectBtn"
          class="size-10 rounded-lg hidden items-center justify-center text-text-secondary hover:bg-primary/5 hover:text-primary transition-colors"
          title="Connect"
        >
          <span class="material-symbols-outlined">cable</span>
        </button>
        <div id="toolPhoneDivider" class="h-px w-8 bg-border-light my-1 hidden"></div>
        <button
          id="toolPhonePreviewBtn"
          class="size-10 rounded-lg hidden items-center justify-center text-text-secondary hover:bg-primary/5 hover:text-primary transition-colors"
          title="Phone Preview"
        >
          <span class="material-symbols-outlined">smartphone</span>
        </button>
      </aside>

      <main id="canvasViewport" class="flex-1 bg-background-light relative overflow-auto p-10">
        <div
          class="absolute inset-0 z-0 opacity-[0.4]"
          style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px"
        ></div>
        <div id="canvasInner" class="relative min-w-[1200px] min-h-[900px] z-0">
          <svg id="edgesSvg" class="absolute left-0 top-0 pointer-events-none z-0"></svg>
          <div id="nodesLayer" class="absolute left-0 top-0 z-10"></div>
          <div id="quickAddWrap" class="absolute z-30 hidden">
            <button
              id="quickAddBtn"
              class="size-10 rounded-full bg-primary hover:bg-primary-hover text-white shadow-lg shadow-indigo-200 flex items-center justify-center transition-all transform hover:scale-105 active:scale-95"
            >
              <span class="material-symbols-outlined">add</span>
            </button>
            <div id="quickAddMenu" class="absolute top-14 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-xl border border-gray-100 w-56 overflow-hidden hidden">
              <div class="bg-gray-50 px-3 py-2 border-b border-gray-100">
                <span class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Add Next Step</span>
              </div>
              <div class="p-1 flex flex-col gap-0.5">
                <button data-add-type="message" class="add-option-btn flex items-center gap-3 w-full p-2 hover:bg-gray-50 rounded-lg text-left group transition-colors">
                  <div class="size-8 rounded bg-blue-50 text-blue-600 flex items-center justify-center group-hover:bg-blue-100 transition-colors">
                    <span class="material-symbols-outlined text-lg">smart_toy</span>
                  </div>
                  <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-700">NPC Reply</span>
                    <span class="text-[10px] text-gray-400">Bot creates dialogue</span>
                  </div>
                </button>
                <button data-add-type="response" class="add-option-btn flex items-center gap-3 w-full p-2 hover:bg-gray-50 rounded-lg text-left group transition-colors">
                  <div class="size-8 rounded bg-purple-50 text-purple-600 flex items-center justify-center group-hover:bg-purple-100 transition-colors">
                    <span class="material-symbols-outlined text-lg">chat_bubble</span>
                  </div>
                  <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-700">Student Response</span>
                    <span class="text-[10px] text-gray-400">User selection choice</span>
                  </div>
                </button>
                <button data-add-type="end" class="add-option-btn flex items-center gap-3 w-full p-2 hover:bg-gray-50 rounded-lg text-left group transition-colors">
                  <div class="size-8 rounded bg-rose-50 text-rose-600 flex items-center justify-center group-hover:bg-rose-100 transition-colors">
                    <span class="material-symbols-outlined text-lg">flag</span>
                  </div>
                  <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-700">End</span>
                    <span class="text-[10px] text-gray-400">Finalize branch</span>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="fixed bottom-8 left-24 flex items-center bg-white border border-gray-200 rounded-full shadow-lg p-1 z-20">
          <button id="zoomOutBtn" class="p-2 hover:bg-gray-100 rounded-full text-text-secondary">
            <span class="material-symbols-outlined text-[20px]">remove</span>
          </button>
          <span id="zoomLabel" class="px-2 text-xs font-medium text-text-primary w-12 text-center">100%</span>
          <button id="zoomInBtn" class="p-2 hover:bg-gray-100 rounded-full text-text-secondary">
            <span class="material-symbols-outlined text-[20px]">add</span>
          </button>
        </div>
      </main>

      <aside
        id="inspectorPanel"
        class="w-[360px] bg-surface-light border-l border-border-light flex flex-col z-10 shadow-[-4px_0_24px_rgba(0,0,0,0.02)] hidden"
      >
        <div class="p-4 border-b border-border-light flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="inspectorIconWrap" class="size-8 rounded bg-primary/10 text-primary flex items-center justify-center overflow-hidden">
              <span id="inspectorIcon" class="material-symbols-outlined">tune</span>
            </div>
            <div>
              <h3 id="inspectorTitle" class="text-sm font-bold text-text-primary">Node</h3>
              <p id="inspectorNodeId" class="text-xs text-text-secondary">ID: -</p>
            </div>
          </div>
          <button id="deleteNodeBtn" class="text-gray-400 hover:text-red-500 transition-colors p-1 hover:bg-red-50 rounded">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>

        <div id="inspectorBody" class="flex-1 overflow-y-auto p-6 flex flex-col gap-5 text-sm"></div>

        <div class="p-4 border-t border-border-light bg-gray-50/50">
          <div class="mb-2 text-xs text-text-secondary" id="saveStatusLabel">No changes</div>
          <button
            id="saveGraphBtn"
            class="w-full py-2.5 bg-primary hover:bg-primary-hover text-white font-bold rounded-lg transition-colors text-sm shadow-md shadow-indigo-200"
          >
            Save Changes
          </button>
        </div>
      </aside>

      <aside
        id="phonePreviewPanel"
        class="w-[460px] h-full bg-gray-50 border-l border-border-light flex-col items-center justify-center p-8 z-20 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] hidden relative"
      >
        <div class="phone-preview-shell">
          <div class="phone-preview-notch"></div>
          <div class="bg-white border-b border-gray-100 pt-8 pb-3 px-4 flex items-center gap-3">
            <span class="material-symbols-outlined text-gray-400 text-lg">chevron_left</span>
            <div
              id="phonePreviewHeaderAvatar"
              class="size-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center overflow-hidden"
            >
              <span class="material-symbols-outlined text-sm">person</span>
            </div>
            <div class="flex flex-col min-w-0">
              <span id="phonePreviewHeaderName" class="text-xs font-bold truncate">NPC</span>
              <span class="text-[10px] text-green-500 font-medium">Active now</span>
            </div>
            <div class="ml-auto flex gap-1">
              <span class="material-symbols-outlined text-primary text-base">call</span>
              <span class="material-symbols-outlined text-primary text-base">videocam</span>
            </div>
          </div>
          <div id="phonePreviewMessages" class="flex-1 min-h-0 p-4 flex flex-col gap-2 overflow-y-auto bg-white"></div>
          <div class="p-3 border-t border-gray-100 bg-white pb-6 flex flex-col gap-3">
            <div id="phonePreviewChoices" class="flex flex-col gap-2"></div>
            <div class="w-full h-8 bg-gray-100 rounded-full px-3 flex items-center">
              <span class="text-[10px] text-gray-400">Aa</span>
            </div>
          </div>
          <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-20 h-1 bg-gray-300 rounded-full"></div>
        </div>
        <button
          id="phonePreviewResetBtn"
          class="absolute top-4 right-14 h-8 rounded-full bg-white border border-gray-200 px-3 text-[11px] font-semibold text-gray-600 hover:text-primary hover:border-primary/30 shadow-sm"
          title="Reset Conversation"
        >
          Сбросить
        </button>
        <button
          id="phonePreviewCloseBtn"
          class="absolute top-4 right-4 size-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 shadow-sm"
          title="Close Phone Preview"
        >
          <span class="material-symbols-outlined text-sm">close</span>
        </button>
      </aside>
    </div>

    <div id="toastContainer" class="fixed right-4 bottom-4 z-50 flex flex-col gap-2"></div>

    <script>
      const storageKeys = {
        accessToken: "dialogTrainerAccessToken",
        session: "dialogTrainerSession",
      };

      const MESSAGE_EMOTION_STATES = [
        { key: "neutral", label: "Neutral", icon: "sentiment_neutral" },
        { key: "happy", label: "Happy", icon: "sentiment_satisfied" },
        { key: "concerned", label: "Concerned", icon: "sentiment_dissatisfied" },
        { key: "angry", label: "Angry", icon: "sentiment_very_dissatisfied" },
      ];

      const app = {
        token: null,
        dialogId: "",
        dialogName: "",
        sceneType: "messenger",
        scenarioVersionId: null,
        revision: null,
        tool: "select",
        pendingConnectSourceId: null,
        quickAddMenuOpen: false,
        responseAddMenuForId: null,
        dirty: false,
        dragging: null,
        assetCatalog: {
          character: [],
          background: [],
        },
        graph: { version: 1, viewport: { zoom: 100, x: 0, y: 0 }, nodes: [], edges: [] },
        selectedNodeId: null,
        phonePreview: {
          open: false,
          selections: {},
          lastBubbleKeys: [],
          awaitFirstChoice: true,
          attemptsUsed: 0,
          attemptsRemaining: null,
          maxAttempts: null,
          summaryRequestKey: "",
          pendingCompletionKey: "",
          loggedCompletionKey: "",
          isCompletionSaving: false,
        },
      };

      const els = {
        backToBuilderBtn: document.getElementById("backToBuilderBtn"),
        dialogNameLabel: document.getElementById("dialogNameLabel"),
        previewBtn: document.getElementById("previewBtn"),
        publishBtn: document.getElementById("publishBtn"),
        toolSelectBtn: document.getElementById("toolSelectBtn"),
        toolAddBtn: document.getElementById("toolAddBtn"),
        toolConnectBtn: document.getElementById("toolConnectBtn"),
        toolPhoneDivider: document.getElementById("toolPhoneDivider"),
        toolPhonePreviewBtn: document.getElementById("toolPhonePreviewBtn"),
        canvasViewport: document.getElementById("canvasViewport"),
        canvasInner: document.getElementById("canvasInner"),
        edgesSvg: document.getElementById("edgesSvg"),
        nodesLayer: document.getElementById("nodesLayer"),
        quickAddWrap: document.getElementById("quickAddWrap"),
        quickAddBtn: document.getElementById("quickAddBtn"),
        quickAddMenu: document.getElementById("quickAddMenu"),
        zoomOutBtn: document.getElementById("zoomOutBtn"),
        zoomInBtn: document.getElementById("zoomInBtn"),
        zoomLabel: document.getElementById("zoomLabel"),
        inspectorPanel: document.getElementById("inspectorPanel"),
        inspectorIconWrap: document.getElementById("inspectorIconWrap"),
        inspectorIcon: document.getElementById("inspectorIcon"),
        inspectorTitle: document.getElementById("inspectorTitle"),
        inspectorNodeId: document.getElementById("inspectorNodeId"),
        deleteNodeBtn: document.getElementById("deleteNodeBtn"),
        inspectorBody: document.getElementById("inspectorBody"),
        saveStatusLabel: document.getElementById("saveStatusLabel"),
        saveGraphBtn: document.getElementById("saveGraphBtn"),
        phonePreviewPanel: document.getElementById("phonePreviewPanel"),
        phonePreviewResetBtn: document.getElementById("phonePreviewResetBtn"),
        phonePreviewCloseBtn: document.getElementById("phonePreviewCloseBtn"),
        phonePreviewMessages: document.getElementById("phonePreviewMessages"),
        phonePreviewChoices: document.getElementById("phonePreviewChoices"),
        phonePreviewHeaderAvatar: document.getElementById("phonePreviewHeaderAvatar"),
        phonePreviewHeaderName: document.getElementById("phonePreviewHeaderName"),
        toastContainer: document.getElementById("toastContainer"),
      };

      function toast(message, type) {
        const item = document.createElement("div");
        item.className =
          "rounded-lg border px-3 py-2 text-xs shadow bg-white " +
          (type === "error"
            ? "border-red-200 text-red-700"
            : type === "warn"
              ? "border-yellow-200 text-yellow-700"
              : "border-indigo-200 text-indigo-700");
        item.textContent = message;
        els.toastContainer.appendChild(item);
        setTimeout(() => item.remove(), 2800);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeSceneType(value) {
        return String(value || "").trim().toLowerCase() === "dialog" ? "dialog" : "messenger";
      }

      function isMessengerScene() {
        return normalizeSceneType(app.sceneType) === "messenger";
      }

      function updatePhonePreviewToolVisibility() {
        const show = isMessengerScene();
        if (els.toolPhonePreviewBtn) {
          els.toolPhonePreviewBtn.classList.toggle("hidden", !show);
          els.toolPhonePreviewBtn.classList.toggle("flex", show);
        }
        if (els.toolPhoneDivider) {
          els.toolPhoneDivider.classList.toggle("hidden", !show);
        }
        if (!show) {
          app.phonePreview.open = false;
        }
      }

      function setPhonePreviewOpen(nextOpen) {
        if (!isMessengerScene()) {
          app.phonePreview.open = false;
          return;
        }
        app.phonePreview.open = Boolean(nextOpen);
        if (!app.phonePreview.open) {
          app.phonePreview.lastBubbleKeys = [];
          return;
        }

        fetchPhonePreviewAttemptsSummary(true);
      }

      function togglePhonePreview() {
        setPhonePreviewOpen(!app.phonePreview.open);
        renderAll();
      }

      function resetPhonePreviewConversation() {
        const remaining = app.phonePreview.attemptsRemaining;
        if (Number.isFinite(Number(remaining)) && Number(remaining) <= 0) {
          toast("Попытки закончились. Сброс недоступен.", "warn");
          return;
        }

        app.phonePreview.selections = {};
        app.phonePreview.lastBubbleKeys = [];
        app.phonePreview.awaitFirstChoice = true;
        app.phonePreview.pendingCompletionKey = "";
        app.phonePreview.loggedCompletionKey = "";
        app.phonePreview.isCompletionSaving = false;
        renderPhonePreview();
        updateToolButtons();
        if (els.phonePreviewMessages) {
          els.phonePreviewMessages.scrollTop = 0;
        }
        toast("Диалог в телефоне сброшен.");
      }

      function parseOptionalInteger(value, min, max) {
        if (value === null || value === undefined || value === "") {
          return null;
        }

        const parsed = Number(value);
        if (!Number.isFinite(parsed)) {
          return null;
        }

        const normalized = Math.trunc(parsed);
        if (normalized < min || normalized > max) {
          return null;
        }

        return normalized;
      }

      function getStartNode() {
        return app.graph.nodes.find((node) => node.type === "start") || null;
      }

      function getStartRuntimeSettings() {
        const startNode = getStartNode();
        const passScore = parseOptionalInteger(
          startNode?.data?.passScore ?? startNode?.data?.passThreshold ?? startNode?.data?.passingScore,
          0,
          100000
        );
        const maxAttempts = parseOptionalInteger(
          startNode?.data?.maxAttempts ?? startNode?.data?.attemptLimit,
          1,
          1000
        );

        return { passScore, maxAttempts };
      }

      async function fetchPhonePreviewAttemptsSummary(forceReload = false) {
        if (!isMessengerScene()) return;

        const { maxAttempts } = getStartRuntimeSettings();
        const requestKey = String(maxAttempts ?? "none");
        if (!forceReload && app.phonePreview.summaryRequestKey === requestKey) {
          return;
        }

        app.phonePreview.summaryRequestKey = requestKey;
        app.phonePreview.maxAttempts = maxAttempts;

        if (maxAttempts === null) {
          app.phonePreview.attemptsUsed = 0;
          app.phonePreview.attemptsRemaining = null;
          return;
        }

        try {
          const params = new URLSearchParams();
          params.set("maxAttempts", String(maxAttempts));
          const payload = await apiRequest(
            `/api/v1/builder/dialogs/${encodeURIComponent(app.dialogId)}/preview/attempts/summary?${params.toString()}`
          );

          app.phonePreview.attemptsUsed = Number(payload?.attemptsUsed || 0);
          app.phonePreview.maxAttempts = parseOptionalInteger(payload?.maxAttempts, 1, 1000) ?? maxAttempts;
          app.phonePreview.attemptsRemaining =
            payload?.attemptsRemaining === null || payload?.attemptsRemaining === undefined
              ? null
              : Math.max(0, Number(payload.attemptsRemaining));
        } catch (error) {
          if (error?.status === 404) {
            // Not published yet: keep local maxAttempts but do not block preview.
            app.phonePreview.attemptsUsed = 0;
            app.phonePreview.attemptsRemaining = maxAttempts;
          }
        } finally {
          renderPhonePreview();
        }
      }

      function getAssetById(type, assetId) {
        const normalizedType = type === "background" ? "background" : "character";
        const list = app.assetCatalog?.[normalizedType];
        if (!Array.isArray(list) || !assetId) {
          return null;
        }
        return list.find((asset) => String(asset.id || "") === String(assetId || "")) || null;
      }

      function getMessageCharacterAsset(node) {
        if (!node || node.type !== "message") {
          return null;
        }
        return getAssetById("character", node.data?.characterAssetId);
      }

      function sortNodesByYThenX(nodes) {
        return (Array.isArray(nodes) ? nodes.slice() : []).sort((a, b) => {
          const ay = Number(a?.position?.y || 0);
          const by = Number(b?.position?.y || 0);
          if (ay !== by) return ay - by;
          const ax = Number(a?.position?.x || 0);
          const bx = Number(b?.position?.x || 0);
          return ax - bx;
        });
      }

      function getFirstNpcMessageNode() {
        const startNode = app.graph.nodes.find((node) => node.type === "start") || null;
        const firstFromStart = sortNodesByX(getOutgoingNodes(startNode?.id, "message"))[0] || null;
        if (firstFromStart) {
          return firstFromStart;
        }

        const npcMessages = app.graph.nodes.filter((node) => {
          if (node.type !== "message") return false;
          const speakerType = String(node.data?.speakerType || "npc").trim().toLowerCase();
          return speakerType !== "system";
        });
        return sortNodesByYThenX(npcMessages)[0] || null;
      }

      function getDefaultCharacterIdFromFirstMessage() {
        const firstMessage = getFirstNpcMessageNode();
        const value = String(firstMessage?.data?.characterAssetId || "").trim();
        return value || null;
      }

      function shouldUseCharacterNameAsSpeaker(node, previousCharacterName) {
        const currentSpeakerName = String(node?.data?.speakerName || "").trim();
        if (!currentSpeakerName || currentSpeakerName.toLowerCase() === "npc") {
          return true;
        }
        if (previousCharacterName && currentSpeakerName === String(previousCharacterName)) {
          return true;
        }
        return false;
      }

      function maybeFillSpeakerNameFromCharacter(node, previousCharacterName) {
        if (!node || node.type !== "message") return false;

        const characterAsset = getMessageCharacterAsset(node);
        if (!characterAsset) return false;

        if (!shouldUseCharacterNameAsSpeaker(node, previousCharacterName)) {
          return false;
        }

        const nextSpeakerName = String(characterAsset.title || "").trim() || "NPC";
        if (String(node.data?.speakerName || "") === nextSpeakerName) {
          return false;
        }

        node.data.speakerName = nextSpeakerName;
        return true;
      }

      function applyDefaultCharacterFromFirstMessage() {
        const firstMessage = getFirstNpcMessageNode();
        const defaultCharacterId = String(firstMessage?.data?.characterAssetId || "").trim();
        if (!defaultCharacterId) return false;

        let changed = false;
        app.graph.nodes.forEach((node) => {
          if (!node || node.type !== "message") return;
          if (node.id === firstMessage.id) return;

          const speakerType = String(node.data?.speakerType || "npc").trim().toLowerCase();
          if (speakerType === "system") return;

          const currentCharacterId = String(node.data?.characterAssetId || "").trim();
          if (currentCharacterId) return;

          node.data.characterAssetId = defaultCharacterId;
          changed = true;
          if (maybeFillSpeakerNameFromCharacter(node)) {
            changed = true;
          }
        });

        return changed;
      }

      function normalizeMessageNodeDataForEditor() {
        let changed = false;

        app.graph.nodes.forEach((node) => {
          if (!node) return;

          if (!node.data || typeof node.data !== "object") {
            node.data = {};
            changed = true;
          }

          if (node.type === "start") {
            const passScore = parseOptionalInteger(
              node.data?.passScore ?? node.data?.passThreshold ?? node.data?.passingScore,
              0,
              100000
            );
            const maxAttempts = parseOptionalInteger(
              node.data?.maxAttempts ?? node.data?.attemptLimit,
              1,
              1000
            );

            if (node.data.passScore !== passScore) {
              node.data.passScore = passScore;
              changed = true;
            }
            if (node.data.maxAttempts !== maxAttempts) {
              node.data.maxAttempts = maxAttempts;
              changed = true;
            }
            return;
          }

          if (node.type !== "message") return;

          const emotionState = normalizeMessageEmotionState(node.data?.emotionState);
          if (node.data.emotionState !== emotionState) {
            node.data.emotionState = emotionState;
            changed = true;
          }

          const speakerType = String(node.data?.speakerType || "npc").trim().toLowerCase();
          if (speakerType !== "system" && maybeFillSpeakerNameFromCharacter(node)) {
            changed = true;
          }

          if (!String(node.data?.speakerName || "").trim()) {
            node.data.speakerName = "NPC";
            changed = true;
          }
        });

        if (applyDefaultCharacterFromFirstMessage()) {
          changed = true;
        }

        return changed;
      }

      function normalizeMessageEmotionState(value) {
        const normalized = String(value || "").trim().toLowerCase();
        return MESSAGE_EMOTION_STATES.some((item) => item.key === normalized) ? normalized : "neutral";
      }

      function getMessageEmotionState(node) {
        return normalizeMessageEmotionState(node?.data?.emotionState);
      }

      function resolveAssetMediaUrl(value) {
        if (!value) return "";
        if (typeof value === "string") return String(value).trim();
        if (typeof value === "object") {
          return String(value.thumbnailUrl || value.fileUrl || value.url || value.src || "")
            .trim();
        }
        return "";
      }

      function resolveCharacterEmotionImageUrl(asset, emotionState) {
        if (!asset) return "";
        const metadata = asset.metadata && typeof asset.metadata === "object" ? asset.metadata : {};
        const stateKey = normalizeMessageEmotionState(emotionState);

        const fromEmotionImages =
          metadata.emotionImages && typeof metadata.emotionImages === "object"
            ? resolveAssetMediaUrl(metadata.emotionImages[stateKey])
            : "";
        if (fromEmotionImages) return fromEmotionImages;

        const fromEmotionMap =
          metadata.emotions &&
          !Array.isArray(metadata.emotions) &&
          typeof metadata.emotions === "object"
            ? resolveAssetMediaUrl(metadata.emotions[stateKey])
            : "";
        if (fromEmotionMap) return fromEmotionMap;

        if (Array.isArray(metadata.emotions)) {
          const fromArray = metadata.emotions.find((item) => {
            const itemKey = String(item?.key || item?.state || item?.emotion || "")
              .trim()
              .toLowerCase();
            return itemKey === stateKey;
          });
          const fromArrayUrl = resolveAssetMediaUrl(fromArray);
          if (fromArrayUrl) return fromArrayUrl;
        }

        const fromFlatKeys =
          resolveAssetMediaUrl(metadata[`${stateKey}Url`]) ||
          resolveAssetMediaUrl(metadata[`${stateKey}_url`]) ||
          resolveAssetMediaUrl(metadata[`emotion_${stateKey}`]) ||
          resolveAssetMediaUrl(metadata[`emotion_${stateKey}_url`]);
        if (fromFlatKeys) return fromFlatKeys;

        // Demo fallback for preinstalled DiceBear characters:
        // if explicit emotion images are not provided, derive a deterministic avatar by emotion.
        if (asset.source === "preinstalled" && typeof asset.fileUrl === "string" && asset.fileUrl.includes("api.dicebear.com")) {
          try {
            const derivedUrl = new URL(asset.fileUrl);
            const seedBase = String(metadata.seed || asset.title || asset.id || "character")
              .trim()
              .replace(/\s+/g, "-");
            derivedUrl.searchParams.set("seed", `${seedBase}-${stateKey}`);
            return derivedUrl.toString();
          } catch (_error) {
            // no-op
          }
        }

        return asset.thumbnailUrl || asset.fileUrl || "";
      }

      function getMessageCharacterImageUrl(node) {
        const asset = getMessageCharacterAsset(node);
        if (!asset) return "";
        return resolveCharacterEmotionImageUrl(asset, getMessageEmotionState(node));
      }

      function renderCharacterThumbOrRobotIcon(imageUrl, titleText, sizeClass) {
        if (imageUrl) {
          return `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(titleText || "Character")}" class="${sizeClass} rounded-full object-cover" />`;
        }
        return `<span class="material-symbols-outlined text-xs">smart_toy</span>`;
      }

      function updateInspectorHeaderVisual(node) {
        if (!els.inspectorIconWrap || !els.inspectorIcon) {
          return;
        }

        const wrapBaseClass = "size-8 rounded-lg flex items-center justify-center overflow-hidden";
        let wrapExtraClass = "bg-primary/10 text-primary";
        let iconMarkup = '<span class="material-symbols-outlined">tune</span>';

        if (node) {
          if (node.type === "start") {
            wrapExtraClass = "bg-green-50 text-green-600 border border-green-200";
            iconMarkup = '<span class="material-symbols-outlined text-[18px]">play_circle</span>';
          } else if (node.type === "message") {
            const imageUrl = getMessageCharacterImageUrl(node);
            if (imageUrl) {
              wrapExtraClass = "bg-slate-100";
              iconMarkup = `<img src="${escapeHtml(imageUrl)}" alt="Character" class="size-8 object-cover" />`;
            } else {
              wrapExtraClass = "bg-primary/10 text-primary border border-primary/20";
              iconMarkup = '<span class="material-symbols-outlined text-[18px]">smart_toy</span>';
            }
          } else if (node.type === "response") {
            wrapExtraClass = "bg-indigo-50 text-indigo-600 border border-indigo-200";
            iconMarkup = '<span class="material-symbols-outlined text-[18px]">chat_bubble</span>';
          } else if (node.type === "end") {
            wrapExtraClass = "bg-rose-50 text-rose-600 border border-rose-200";
            iconMarkup = '<span class="material-symbols-outlined text-[18px]">flag</span>';
          }
        }

        els.inspectorIconWrap.className = `${wrapBaseClass} ${wrapExtraClass}`;
        els.inspectorIconWrap.innerHTML = iconMarkup;
      }

      function sortNodesByX(nodes) {
        return (Array.isArray(nodes) ? nodes.slice() : []).sort((a, b) => {
          const ax = Number(a?.position?.x || 0);
          const bx = Number(b?.position?.x || 0);
          return ax - bx;
        });
      }

      function getOutgoingNodes(sourceId, targetType) {
        if (!sourceId) return [];
        const outgoing = app.graph.edges
          .filter((edge) => edge.source === sourceId)
          .map((edge) => getNodeById(edge.target))
          .filter((node) => Boolean(node));

        if (!targetType) {
          return outgoing;
        }

        return outgoing.filter((node) => node.type === targetType);
      }

      function getMessageBackgroundImageUrl(node) {
        if (!node || node.type !== "message") return "";
        const background = getAssetById("background", node.data?.backgroundAssetId);
        return resolveAssetMediaUrl(background?.fileUrl || background?.thumbnailUrl);
      }

      function buildMessengerPreviewState() {
        const { passScore, maxAttempts } = getStartRuntimeSettings();
        const baseState = {
          headerName: "NPC",
          headerAvatarUrl: "",
          backgroundImageUrl: "",
          bubbles: [],
          choices: [],
          activeMessageId: null,
          empty: true,
          totalScore: 0,
          finished: false,
          passed: true,
          passScore,
          maxAttempts,
          finishNodeId: null,
          finishLabel: "",
          completionKey: "",
        };

        const startNode = app.graph.nodes.find((node) => node.type === "start") || null;
        const firstMessageFromStart = sortNodesByX(getOutgoingNodes(startNode?.id, "message"))[0] || null;
        const fallbackMessage = app.graph.nodes.find((node) => node.type === "message") || null;
        let currentMessage = firstMessageFromStart || fallbackMessage;

        if (!currentMessage) {
          return baseState;
        }

        const bubbles = [];
        let headerName = "NPC";
        let headerAvatarUrl = "";
        let backgroundImageUrl = "";
        let choices = [];
        let activeMessageId = null;
        let totalScore = 0;
        let finished = false;
        let finishNode = null;
        const visited = new Set();
        let depth = 0;

        while (currentMessage && depth < 12) {
          const revisitedMessage = visited.has(currentMessage.id);
          visited.add(currentMessage.id);
          depth += 1;

          const speakerName = String(currentMessage.data?.speakerName || "").trim() || "NPC";
          const messageText = String(currentMessage.data?.text || "").trim() || "Empty message";
          const characterAsset = getMessageCharacterAsset(currentMessage);
          const characterImageUrl = getMessageCharacterImageUrl(currentMessage);
          const backgroundUrl = getMessageBackgroundImageUrl(currentMessage);

          if (!headerAvatarUrl && characterImageUrl) {
            headerAvatarUrl = characterImageUrl;
          }
          if (headerName === "NPC" && (characterAsset?.title || speakerName)) {
            headerName = String(characterAsset?.title || speakerName);
          }
          if (!backgroundImageUrl && backgroundUrl) {
            backgroundImageUrl = backgroundUrl;
          }

          bubbles.push({
            key: `m_${currentMessage.id}`,
            side: "left",
            text: messageText,
          });

          const responseNodes = sortNodesByX(getOutgoingNodes(currentMessage.id, "response"));
          if (responseNodes.length === 0) {
            choices = [];
            activeMessageId = null;
            break;
          }

          activeMessageId = currentMessage.id;
          choices = responseNodes.map((responseNode) => ({
            id: responseNode.id,
            text: String(responseNode.data?.responseText || "").trim() || "Empty response",
          }));

          if (app.phonePreview.awaitFirstChoice) {
            break;
          }

          // Stop traversal on cycles after rendering the revisited NPC message and choices.
          if (revisitedMessage) {
            break;
          }

          const selectedResponseId = String(app.phonePreview.selections[currentMessage.id] || "").trim();
          if (!selectedResponseId) {
            break;
          }

          const selectedResponse = responseNodes.find(
            (responseNode) => responseNode.id === selectedResponseId
          );
          if (!selectedResponse) {
            delete app.phonePreview.selections[currentMessage.id];
            break;
          }

          const scoreDelta = Number(selectedResponse.data?.scoreDelta);
          totalScore += Number.isFinite(scoreDelta) ? scoreDelta : 0;

          bubbles.push({
            key: `r_${selectedResponse.id}`,
            side: "right",
            text: String(selectedResponse.data?.responseText || "").trim() || "Empty response",
          });

          const nextMessage = sortNodesByX(getOutgoingNodes(selectedResponse.id, "message"))[0] || null;
          if (nextMessage) {
            currentMessage = nextMessage;
            continue;
          }

          finishNode = sortNodesByX(getOutgoingNodes(selectedResponse.id, "end"))[0] || {
            id: "finish_auto",
            data: { endingType: "neutral", title: "Finish" },
          };
          finished = true;
          choices = [];
          activeMessageId = null;
          break;
        }

        let passed = true;
        if (finished) {
          if (passScore !== null) {
            passed = totalScore >= passScore;
          } else {
            const endingType = String(finishNode?.data?.endingType || "")
              .trim()
              .toLowerCase();
            passed = endingType !== "fail";
          }
        }

        const selectionKey = Object.keys(app.phonePreview.selections || {})
          .sort()
          .map((messageId) => `${messageId}:${app.phonePreview.selections[messageId]}`)
          .join("|");
        const completionKey = finished
          ? `${String(finishNode?.id || "finish")}|${totalScore}|${passScore ?? "none"}|${selectionKey}`
          : "";
        const finishLabel = String(finishNode?.data?.title || "").trim() || "Finish";

        return {
          headerName,
          headerAvatarUrl,
          backgroundImageUrl,
          bubbles,
          choices,
          activeMessageId,
          empty: bubbles.length === 0,
          totalScore,
          finished,
          passed,
          passScore,
          maxAttempts,
          finishNodeId: finishNode?.id || null,
          finishLabel,
          completionKey,
        };
      }

      async function completePhonePreviewAttempt(preview) {
        if (!preview?.finished) return;

        const completionKey = String(preview.completionKey || "").trim();
        if (!completionKey) return;
        if (app.phonePreview.loggedCompletionKey === completionKey) return;
        if (app.phonePreview.pendingCompletionKey === completionKey) return;

        app.phonePreview.pendingCompletionKey = completionKey;
        app.phonePreview.isCompletionSaving = true;

        try {
          const payload = await apiRequest(
            `/api/v1/builder/dialogs/${encodeURIComponent(app.dialogId)}/preview/attempts/complete`,
            {
              method: "POST",
              body: {
                finalScore: preview.totalScore,
                passed: Boolean(preview.passed),
                passScore: preview.passScore,
                maxAttempts: preview.maxAttempts,
              },
            }
          );

          app.phonePreview.loggedCompletionKey = completionKey;
          app.phonePreview.attemptsUsed = Number(payload?.attemptsUsed || app.phonePreview.attemptsUsed || 0);
          app.phonePreview.maxAttempts =
            parseOptionalInteger(payload?.maxAttempts, 1, 1000) ?? preview.maxAttempts;
          app.phonePreview.attemptsRemaining =
            payload?.attemptsRemaining === null || payload?.attemptsRemaining === undefined
              ? null
              : Math.max(0, Number(payload.attemptsRemaining));

          if (preview.passed) {
            toast("Результат попытки сохранен.");
          } else if (
            Number.isFinite(Number(app.phonePreview.attemptsRemaining)) &&
            Number(app.phonePreview.attemptsRemaining) <= 0
          ) {
            toast("Тест провален. Попытки закончились.", "warn");
          } else {
            toast("Тест провален. Попытка зафиксирована.", "warn");
          }
        } catch (error) {
          if (error?.status === 404) {
            // Preview can work for unpublished drafts; skip DB tracking in this case.
            app.phonePreview.loggedCompletionKey = completionKey;
          } else if (error?.status === 409) {
            const used = Number(error?.data?.attemptsUsed);
            const remaining = Number(error?.data?.attemptsRemaining);
            if (Number.isFinite(used)) {
              app.phonePreview.attemptsUsed = Math.max(0, used);
            }
            app.phonePreview.maxAttempts =
              parseOptionalInteger(error?.data?.maxAttempts, 1, 1000) ?? preview.maxAttempts;
            app.phonePreview.attemptsRemaining = Number.isFinite(remaining) ? Math.max(0, remaining) : 0;
            app.phonePreview.loggedCompletionKey = completionKey;
            toast("Попытки закончились.", "warn");
          } else {
            app.phonePreview.loggedCompletionKey = completionKey;
            toast(error.message || "Не удалось зафиксировать попытку.", "error");
          }
        } finally {
          app.phonePreview.pendingCompletionKey = "";
          app.phonePreview.isCompletionSaving = false;
          renderPhonePreview();
        }
      }

      function renderPhonePreview() {
        updatePhonePreviewToolVisibility();

        if (!els.phonePreviewPanel) {
          return;
        }

        const shouldShow = isMessengerScene() && app.phonePreview.open;
        els.phonePreviewPanel.classList.toggle("hidden", !shouldShow);
        els.phonePreviewPanel.classList.toggle("flex", shouldShow);

        if (!shouldShow) {
          return;
        }

        void fetchPhonePreviewAttemptsSummary(false);

        const preview = buildMessengerPreviewState();
        if (preview.finished) {
          void completePhonePreviewAttempt(preview);
        }

        const avatarMarkup = preview.headerAvatarUrl
          ? `<img src="${escapeHtml(preview.headerAvatarUrl)}" alt="${escapeHtml(
              preview.headerName
            )}" class="size-8 object-cover" />`
          : '<span class="material-symbols-outlined text-sm">person</span>';

        if (els.phonePreviewHeaderAvatar) {
          els.phonePreviewHeaderAvatar.innerHTML = avatarMarkup;
        }
        if (els.phonePreviewHeaderName) {
          els.phonePreviewHeaderName.textContent = preview.headerName || "NPC";
        }

        const resetBlocked =
          Number.isFinite(Number(app.phonePreview.attemptsRemaining)) &&
          Number(app.phonePreview.attemptsRemaining) <= 0;
        const attemptsExhausted = resetBlocked;
        if (els.phonePreviewResetBtn) {
          els.phonePreviewResetBtn.disabled = resetBlocked;
          els.phonePreviewResetBtn.classList.toggle("opacity-60", resetBlocked);
          els.phonePreviewResetBtn.classList.toggle("cursor-not-allowed", resetBlocked);
          els.phonePreviewResetBtn.title = resetBlocked
            ? "Попытки закончились"
            : "Reset Conversation";
        }

        const backgroundStyle = preview.backgroundImageUrl
          ? ` style="background-image: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), url('${escapeHtml(
              preview.backgroundImageUrl
            )}'); background-size: cover; background-position: center;"`
          : "";

        if (preview.empty) {
          els.phonePreviewMessages.innerHTML = `
            <div class="h-full flex items-center justify-center text-center text-xs text-slate-400">
              Add a Message node to see messenger preview.
            </div>
          `;
          if (els.phonePreviewChoices) {
            els.phonePreviewChoices.innerHTML = "";
          }
          app.phonePreview.lastBubbleKeys = [];
          return;
        }

        const previousBubbleSet = new Set(
          Array.isArray(app.phonePreview.lastBubbleKeys) ? app.phonePreview.lastBubbleKeys : []
        );
        const bubblesMarkup = preview.bubbles
          .map((bubble, index) => {
            const bubbleClass = bubble.side === "right" ? "phone-bubble-right" : "phone-bubble-left";
            const isNewBubble = !previousBubbleSet.has(String(bubble.key || ""));
            const enterClass = isNewBubble ? "phone-bubble-enter" : "";
            const delayStyle = isNewBubble ? ` style="animation-delay:${index * 40}ms"` : "";
            return `<div class="${bubbleClass} ${enterClass}"${delayStyle}>${escapeHtml(bubble.text)}</div>`;
          })
          .join("");

        const attemptsLine =
          preview.maxAttempts === null
            ? ""
            : `<p class="text-[10px] text-center text-slate-400 mt-1">Attempts: ${escapeHtml(
                String(app.phonePreview.attemptsUsed || 0)
              )} / ${escapeHtml(String(preview.maxAttempts))}${
                app.phonePreview.attemptsRemaining === null
                  ? ""
                  : ` (remaining: ${escapeHtml(String(app.phonePreview.attemptsRemaining))})`
              }</p>`;

        const finishedMarkup = preview.finished
          ? `
              <div class="rounded-xl border px-3 py-2 text-xs ${
                preview.passed
                  ? "border-green-200 bg-green-50 text-green-700"
                  : "border-rose-200 bg-rose-50 text-rose-700"
              }">
                <div class="font-semibold">${
                  preview.passed ? "Тест пройден" : "Тест провален"
                }</div>
                <div class="mt-1">PTS: <b>${escapeHtml(String(preview.totalScore))}</b>${
                  preview.passScore !== null
                    ? `, проходной балл: <b>${escapeHtml(String(preview.passScore))}</b>`
                    : ""
                }</div>
                <div class="mt-1 text-[10px] opacity-80">Finish: ${escapeHtml(
                  preview.finishLabel || "Finish"
                )}</div>
                ${attemptsLine}
              </div>
            `
          : "";

        const choicesMarkup = preview.finished
          ? finishedMarkup
          : attemptsExhausted
            ? `
              <div class="rounded-xl border border-rose-200 bg-rose-50 text-rose-700 px-3 py-2 text-xs">
                Попытки закончились. Сброс недоступен.
                ${attemptsLine}
              </div>
            `
            : preview.choices.length
            ? `
              <p class="text-[10px] text-center text-gray-400 uppercase font-bold tracking-widest mb-1">Select Response</p>
              ${preview.choices
                .map((choice) => {
                  const selectedId = String(app.phonePreview.selections[preview.activeMessageId] || "");
                  const activeClass = selectedId === choice.id ? "active" : "";
                  return `
                    <button
                      type="button"
                      class="phone-choice-btn ${activeClass}"
                      data-phone-choice-id="${escapeHtml(choice.id)}"
                      data-phone-message-id="${escapeHtml(preview.activeMessageId || "")}"
                    >
                      ${escapeHtml(choice.text)}
                    </button>
                  `;
                })
                .join("")}
            `
            : attemptsLine;

        els.phonePreviewMessages.innerHTML = `
          <div class="min-h-full flex flex-col gap-2"${backgroundStyle}>
            ${bubblesMarkup}
          </div>
        `;
        if (els.phonePreviewChoices) {
          els.phonePreviewChoices.innerHTML = choicesMarkup;
        }
        app.phonePreview.lastBubbleKeys = preview.bubbles.map((bubble) => String(bubble.key || ""));
      }

      function getToken() {
        const direct = localStorage.getItem(storageKeys.accessToken);
        if (direct) return direct;
        const raw = localStorage.getItem(storageKeys.session);
        if (!raw) return null;
        try {
          const session = JSON.parse(raw);
          return session?.access_token || null;
        } catch (_error) {
          return null;
        }
      }

      function getDialogIdFromPath() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        return String(parts[parts.length - 1] || "").trim();
      }

      function createDefaultGraph() {
        return {
          version: 1,
          viewport: { zoom: 100, x: 0, y: 0 },
          nodes: [
            {
              id: "node_start",
              type: "start",
              position: { x: 520, y: 80 },
              data: {
                title: "Scenario Initialization",
                passScore: null,
                maxAttempts: null,
              },
            },
          ],
          edges: [],
        };
      }
      function ensureGraph(rawGraph) {
        const fallback = createDefaultGraph();
        const raw = rawGraph && typeof rawGraph === "object" ? rawGraph : {};

        const nodes = Array.isArray(raw.nodes) ? raw.nodes : [];
        const edges = Array.isArray(raw.edges) ? raw.edges : [];
        const byId = new Map();
        const normalizedNodes = [];

        for (const node of nodes) {
          if (!node || typeof node !== "object") continue;
          const id = String(node.id || "").trim();
          const type = String(node.type || "").trim().toLowerCase();
          if (!id || !["start", "message", "response", "end"].includes(type)) continue;
          if (byId.has(id)) continue;
          const safeNode = {
            id,
            type,
            position: {
              x: Number.isFinite(Number(node?.position?.x)) ? Number(node.position.x) : 120,
              y: Number.isFinite(Number(node?.position?.y)) ? Number(node.position.y) : 120,
            },
            data: node.data && typeof node.data === "object" ? { ...node.data } : {},
          };
          byId.set(id, safeNode);
          normalizedNodes.push(safeNode);
        }

        const startNodes = normalizedNodes.filter((n) => n.type === "start");
        if (startNodes.length === 0) {
          normalizedNodes.unshift(fallback.nodes[0]);
          byId.set(fallback.nodes[0].id, fallback.nodes[0]);
        } else if (startNodes.length > 1) {
          const keepId = startNodes[0].id;
          for (let i = normalizedNodes.length - 1; i >= 0; i -= 1) {
            if (normalizedNodes[i].type === "start" && normalizedNodes[i].id !== keepId) {
              byId.delete(normalizedNodes[i].id);
              normalizedNodes.splice(i, 1);
            }
          }
        }

        const normalizedEdges = [];
        const edgeKeySet = new Set();
        const startEdgeSources = new Set();
        const responseEdgeSources = new Set();
        for (const edge of edges) {
          if (!edge || typeof edge !== "object") continue;
          const source = String(edge.source || "").trim();
          const target = String(edge.target || "").trim();
          if (!source || !target || source === target) continue;
          const sourceNode = byId.get(source);
          const targetNode = byId.get(target);
          if (!sourceNode || !targetNode) continue;
          if (sourceNode.type === "end" || targetNode.type === "start") continue;
          if (!isConnectionAllowed(sourceNode.type, targetNode.type)) continue;
          if (sourceNode.type === "start" && startEdgeSources.has(source)) continue;
          if (sourceNode.type === "response" && responseEdgeSources.has(source)) continue;
          const key = `${source}->${target}`;
          if (edgeKeySet.has(key)) continue;
          edgeKeySet.add(key);
          normalizedEdges.push({
            id: String(edge.id || `edge_${normalizedEdges.length + 1}`),
            source,
            target,
          });
          if (sourceNode.type === "start") {
            startEdgeSources.add(source);
          }
          if (sourceNode.type === "response") {
            responseEdgeSources.add(source);
          }
        }

        return {
          version: 1,
          viewport: { zoom: 100, x: 0, y: 0 },
          nodes: normalizedNodes,
          edges: normalizedEdges,
        };
      }

      async function apiRequest(pathname, options) {
        const response = await fetch(pathname, {
          method: options?.method || "GET",
          headers: {
            Authorization: `Bearer ${app.token}`,
            ...(options?.body ? { "Content-Type": "application/json" } : {}),
          },
          body: options?.body ? JSON.stringify(options.body) : undefined,
        });

        const text = await response.text();
        let data = {};
        if (text) {
          try {
            data = JSON.parse(text);
          } catch (_error) {
            data = {};
          }
        }

        if (!response.ok) {
          const error = new Error(data?.error || `Request failed: ${response.status}`);
          error.status = response.status;
          error.data = data;
          throw error;
        }

        return data;
      }

      async function loadAssetCatalog() {
        try {
          const [charactersPayload, backgroundsPayload] = await Promise.all([
            apiRequest("/api/v1/assets?type=character"),
            apiRequest("/api/v1/assets?type=background"),
          ]);

          app.assetCatalog.character = Array.isArray(charactersPayload?.items)
            ? charactersPayload.items
            : [];
          app.assetCatalog.background = Array.isArray(backgroundsPayload?.items)
            ? backgroundsPayload.items
            : [];
        } catch (_error) {
          app.assetCatalog.character = [];
          app.assetCatalog.background = [];
        }
      }

        if (type === "start") return { width: 192, height: 98 };

        return { width: 220, height: 96 };

      function getZoomScale() {
        const rawZoom = Number(app.graph?.viewport?.zoom || 100);
        return Math.max(0.25, Math.min(2, rawZoom / 100));
      }

      function applyViewportTransform(bounds) {
        const scale = getZoomScale();
        const scaledWidth = Math.round(bounds.width * scale);
        const scaledHeight = Math.round(bounds.height * scale);

        els.canvasInner.style.width = `${scaledWidth}px`;
        els.canvasInner.style.height = `${scaledHeight}px`;

        els.nodesLayer.style.width = `${bounds.width}px`;
        els.nodesLayer.style.height = `${bounds.height}px`;
        els.edgesSvg.style.width = `${bounds.width}px`;
        els.edgesSvg.style.height = `${bounds.height}px`;

        [els.nodesLayer, els.edgesSvg].forEach((element) => {
          element.style.transformOrigin = "top left";
          element.style.transform = `scale(${scale})`;
        });

        // Keep floating quick-add in screen space; position is computed from rendered node rects.
        els.quickAddWrap.style.transformOrigin = "";
        els.quickAddWrap.style.transform = "";

      function getCanvasBounds() {
        let width = 1200;
        let height = 900;
        const nodeEls = els.nodesLayer.querySelectorAll("[data-node-id]");
        nodeEls.forEach((nodeEl) => {
          width = Math.max(width, nodeEl.offsetLeft + nodeEl.offsetWidth + 280);
          height = Math.max(height, nodeEl.offsetTop + nodeEl.offsetHeight + 280);
        });
        return { width, height };
      }

      function renderEdges() {
        const bounds = getCanvasBounds();
        els.edgesSvg.setAttribute("viewBox", `0 0 ${bounds.width} ${bounds.height}`);
        els.edgesSvg.setAttribute("preserveAspectRatio", "none");
        els.edgesSvg.innerHTML = "";

        app.graph.edges.forEach((edge) => {
          const sourceEl = els.nodesLayer.querySelector(`[data-node-id="${CSS.escape(edge.source)}"]`);
          const targetEl = els.nodesLayer.querySelector(`[data-node-id="${CSS.escape(edge.target)}"]`);
          if (!sourceEl || !targetEl) return;

          const sx = sourceEl.offsetLeft + sourceEl.offsetWidth / 2;
          const sy = sourceEl.offsetTop + sourceEl.offsetHeight;
          const tx = targetEl.offsetLeft + targetEl.offsetWidth / 2;
          const ty = targetEl.offsetTop;

          const verticalDelta = Math.abs(ty - sy);
          const curve = Math.max(42, Math.min(140, Math.round(verticalDelta * 0.45)));
          const isForward = ty >= sy;
          const c1y = isForward ? sy + curve : sy + 32;
          const c2y = isForward ? ty - curve : ty - 32;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", `M ${sx} ${sy} C ${sx} ${c1y}, ${tx} ${c2y}, ${tx} ${ty}`);
          path.setAttribute("stroke", "#cbd5e1");
          path.setAttribute("stroke-width", "2");
          path.setAttribute("fill", "none");
          els.edgesSvg.appendChild(path);
        });

        applyViewportTransform(bounds);
      }
